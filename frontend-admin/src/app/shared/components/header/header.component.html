<header class="app-header">
  <div class="header-left">
    <div class="logo">
      <div class="logo-icon">🎓</div>
      <span class="logo-text">EQuizz Admin</span>
    </div>
  </div>

  <div class="header-center">
    <app-search-bar />
  </div>

  <div class="header-right">
    <!-- Notifications -->
    <button class="icon-btn" title="Notifications">
      <span class="icon">🔔</span>
      @if (notificationCount() > 0) {
        <span class="badge">{{ notificationCount() }}</span>
      }
    </button>

    <!-- User Menu -->
    <div class="user-menu" *ngIf="currentUser()">
      <button class="user-btn" (click)="toggleUserMenu()">
        <div class="user-avatar">
          <span>{{ getUserInitials() }}</span>
        </div>
        <div class="user-details">
          <span class="user-name">{{ getUserName() }}</span>
          <span class="user-role">{{ getUserRole() }}</span>
        </div>
        <span class="chevron">▼</span>
      </button>

      <div class="user-dropdown" *ngIf="isUserMenuOpen()">
        <div class="user-info">
          <div class="user-avatar-large">
            <span>{{ getUserInitials() }}</span>
          </div>
          <div>
            <p class="user-name-large">{{ getUserName() }}</p>
            <p class="user-email">{{ getUserEmail() }}</p>
            <p class="user-role-badge">{{ getUserRole() }}</p>
          </div>
        </div>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item" (click)="onProfile()">
          <span class="item-icon">👤</span> Mon profil
        </button>
        <button class="dropdown-item" (click)="onSettings()">
          <span class="item-icon">⚙️</span> Paramètres
        </button>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item danger" (click)="onLogout()">
          <span class="item-icon">🚪</span> Déconnexion
        </button>
      </div>
    </div>
  </div>
</header>
