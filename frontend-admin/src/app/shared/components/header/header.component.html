<header class="app-header">
  <div class="header-left">
    <div class="logo">
      <div class="logo-icon">🎓</div>
      <span class="logo-text">EQuizz Admin</span>
    </div>
  </div>

  <div class="header-center">
    <app-search-bar />
  </div>

  <div class="header-right">
    <!-- Notifications -->
    <button class="icon-btn" title="Notifications">
      <span class="icon">🔔</span>
      @if (notificationCount() > 0) {
        <span class="badge">{{ notificationCount() }}</span>
      }
    </button>

    <!-- User Menu -->
    <div class="user-menu">
      <button class="user-btn" (click)="toggleUserMenu()">
        <div class="user-avatar">
          <span>{{ getUserInitials() }}</span>
        </div>
        <span class="user-name">{{ currentUser().name }}</span>
        <span class="chevron">▼</span>
      </button>

      @if (showUserMenu()) {
        <div class="user-dropdown">
          <div class="user-info">
            <div class="user-avatar-large">
              <span>{{ getUserInitials() }}</span>
            </div>
            <div>
              <p class="user-name-large">{{ currentUser().name }}</p>
              <p class="user-email">{{ currentUser().email }}</p>
            </div>
          </div>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item" (click)="onProfile()">
            <span class="item-icon">👤</span> Mon profil
          </button>
          <button class="dropdown-item" (click)="onSettings()">
            <span class="item-icon">⚙️</span> Paramètres
          </button>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item danger" (click)="onLogout()">
            <span class="item-icon">🚪</span> Déconnexion
          </button>
        </div>
      }
    </div>
  </div>
</header>
