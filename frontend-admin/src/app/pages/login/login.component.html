<!-- src/app/pages/login/login.component.html -->
<div class="login-wrapper">
  <div class="login-container">
    <div class="login-card">
      <!-- En-tête avec logo -->
      <div class="login-header">
        <div class="logo-wrapper">
          <div class="logo-circle">
            <span class="logo-text">EQ</span>
          </div>
        </div>
        <h1 class="login-title">Bienvenue sur EQUIZZ</h1>
        <p class="login-subtitle">Connectez-vous pour continuer</p>
      </div>

      <!-- Formulaire -->
      <form (ngSubmit)="onLogin()" #loginForm="ngForm" class="login-form">
        <!-- Message d'erreur -->
        <div class="alert-message error" *ngIf="errorMessage">
          <span class="alert-icon">⚠️</span>
          <span class="alert-text">{{ errorMessage }}</span>
        </div>

        <!-- Champ Email -->
        <div class="form-field">
          <label for="email">Adresse email</label>
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="votre.email@exemple.com"
              [(ngModel)]="email"
              required
              [disabled]="isLoading"
              autocomplete="email"
            />
          </div>
        </div>

        <!-- Champ Mot de passe -->
        <div class="form-field">
          <label for="password">Mot de passe</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              name="password"
              placeholder="••••••••"
              [(ngModel)]="password"
              required
              [disabled]="isLoading"
              autocomplete="current-password"
            />
            <button
              type="button"
              class="toggle-password-btn"
              (click)="togglePasswordVisibility()"
              [disabled]="isLoading"
              tabindex="-1"
            >
              <span *ngIf="!showPassword">👁️</span>
              <span *ngIf="showPassword">🙈</span>
            </button>
          </div>
        </div>

        <!-- Options -->
        <div class="form-options">
          <label class="checkbox-wrapper">
            <input
              type="checkbox"
              name="rememberMe"
              [(ngModel)]="rememberMe"
            />
            <span class="checkbox-label">Se souvenir de moi</span>
          </label>
          <a href="javascript:void(0)" class="forgot-link">Mot de passe oublié ?</a>
        </div>

        <!-- Bouton de connexion -->
        <button
          type="submit"
          class="login-btn"
          [disabled]="isLoading || !email || !password"
        >
          <span *ngIf="!isLoading">Se connecter</span>
          <span *ngIf="isLoading" class="loading-content">
            <span class="spinner"></span>
            Connexion...
          </span>
        </button>
      </form>

      <!-- Informations de test -->
      <div class="test-credentials">
        <div class="test-header">
          <span class="test-icon">🔑</span>
          <span class="test-title">Compte de démonstration</span>
        </div>
        <div class="test-info">
          <div class="credential-item">
            <span class="credential-label">Email :</span>
            <span class="credential-value">admin@equizz.com</span>
          </div>
          <div class="credential-item">
            <span class="credential-label">Mot de passe :</span>
            <span class="credential-value">admin123</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <p>© 2025 EQUIZZ - Plateforme de gestion d'évaluations</p>
    </div>
  </div>
</div>
